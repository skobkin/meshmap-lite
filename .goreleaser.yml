version: 2

project_name: app

gitea_urls:
  api: "{{ .Env.FORGE_API_URL }}"
  download: "{{ .Env.FORGE_DOWNLOAD_URL }}"

before:
  hooks:
    - go mod tidy

builds:
  - id: app
    main: ./cmd/app
    binary: app
    env:
      - CGO_ENABLED=1
      - CC={{ if eq .Os "windows" }}x86_64-w64-mingw32-gcc{{ else }}gcc{{ end }}
      - CXX={{ if eq .Os "windows" }}x86_64-w64-mingw32-g++{{ else }}g++{{ end }}
    goos:
      - linux
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
