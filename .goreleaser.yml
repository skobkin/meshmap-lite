version: 2

project_name: meshmap-lite

gitea_urls:
  api: "{{ .Env.FORGE_API_URL }}"
  download: "{{ .Env.FORGE_DOWNLOAD_URL }}"

before:
  hooks:
    - go mod tidy
    - test -f web/dist/index.html

builds:
  - id: server
    main: ./cmd/server
    binary: server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - web/dist/**

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^build(\([^)]*\))?!?:'
      - '^ci(\([^)]*\))?!?:'
      - '^chore(\([^)]*\))?!?:'
      - '^docs(\([^)]*\))?!?:'
      - '^refactor(\([^)]*\))?!?:'
      - '^style(\([^)]*\))?!?:'
      - '^test(\([^)]*\))?!?:'
