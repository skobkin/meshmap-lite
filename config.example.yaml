mqtt:
  host: localhost
  port: 1883
  # Optional: stable MQTT client ID. If omitted, app derives one from hostname + root topic.
  client_id: ""
  root_topic: msh/RU/ARKH
  protocol_version: 3.1.1
  subscribe_qos: 1
  clean_session: false
  reconnect_timeout: 10s
  connect_timeout: 10s
  keepalive: 60s

ingest:
  map_reports:
    enabled: true
    topic_suffix: 2/map
  traceroute:
    timeout: 60s
    max_entries: 1000
    final_retention: 60s

storage:
  kv:
    driver: memory
    size: 100000
    ttl: 6h
  sql:
    driver: sqlite
    url: ./data/db.sqlite
    auto_migrate: true
    # 0 disables row-cap pruning.
    log_max_rows: 50000
    # Number of rows allowed above cap before prune runs. Prune always shrinks back to log_max_rows.
    log_prune_batch_rows: 1000

channels:
  LongFast:
    psk: AQ==
    events: [text_message, node_info, position, telemetry]
    primary: true
  PingPong:
    psk: AQ==
    events: [text_message]
    primary: false

web:
  listen_addr: :8080
  chat:
    enabled: true
    default_channel: LongFast
    show_recent_messages: 50
  ws:
    heartbeat_interval: 30s
    stats_interval: 60s
  map:
    clustering: false
    disconnected_threshold: 60m
    precision_circles_mode: selected
    default_view:
      latitude: 64.5
      longitude: 40.6
      zoom: 13
  log:
    live_updates: true
    page_size_default: 100

logging:
  level: info
