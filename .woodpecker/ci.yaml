when:
  - event: [push, tag]

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      depth: 0

steps:
  fmt:
    image: golang:1.25
    commands:
      - |
        fmt_out=$(gofmt -l ./cmd ./internal 2>/dev/null)
        if [ -n "$fmt_out" ]; then
          echo "The following files need gofmt:"
          echo "$fmt_out"
          exit 1
        fi

  lint:
    image: golangci/golangci-lint:v2.8-alpine
    environment:
      XDG_CACHE_HOME: /tmp/.cache
    commands:
      - golangci-lint run

  vet:
    image: golang:1.25
    environment:
      GOCACHE: /tmp/.gocache
    commands:
      - go vet ./...

  test:
    image: golang:1.25
    environment:
      GOCACHE: /tmp/.gocache
    commands:
      - go test ./...

  build:
    image: golang:1.25
    environment:
      GOCACHE: /tmp/.gocache
    commands:
      - CGO_ENABLED=0 go build -trimpath -o server ./cmd/server
    when:
      - event: push

  release-forgejo:
    depends_on:
      - fmt
      - lint
      - vet
      - test
    image: goreleaser/goreleaser-cross:v1.25-v2.12.7
    environment:
      FORGE_TOKEN:
        from_secret: FORGE_TOKEN
    commands:
      - |
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache nodejs npm
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update
          apt-get install -y --no-install-recommends nodejs npm
          rm -rf /var/lib/apt/lists/*
        else
          echo "No supported package manager found to install nodejs/npm"
          exit 1
        fi
      - test -n "$CI_FORGE_URL" || (echo "CI_FORGE_URL is empty. Cannot derive Forge URLs for GoReleaser." && exit 1)
      - export GITEA_TOKEN="${GITEA_TOKEN:-$FORGE_TOKEN}"
      - test -n "$FORGE_API_URL" || export FORGE_API_URL="$CI_FORGE_URL/api/v1"
      - test -n "$FORGE_DOWNLOAD_URL" || export FORGE_DOWNLOAD_URL="$CI_FORGE_URL"
      - goreleaser release --clean
    when:
      - event: tag

  release-docker:
    depends_on:
      - fmt
      - lint
      - vet
      - test
    # 'woodpeckerci/plugin-docker-buildx:6' should be added to WOODPECKER_PLUGINS_PRIVILEGED for Woodpecker stack
    image: woodpeckerci/plugin-docker-buildx:6
    settings:
      repo:
        - skobkin/meshmap-lite
        - ghcr.io/skobkin/meshmap-lite
      dockerfile: Dockerfile
      tags:
        - ${CI_COMMIT_TAG}
        - latest
      platforms:
        - linux/amd64
      logins:
        - registry: https://index.docker.io/v1/
          username:
            from_secret: DOCKER_LOGIN
          password:
            from_secret: DOCKER_TOKEN
        - registry: https://ghcr.io
          username:
            from_secret: GHCR_LOGIN
          password:
            from_secret: GHCR_TOKEN
    when:
      - event: tag
